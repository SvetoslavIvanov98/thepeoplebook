<!DOCTYPE html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>The People Book</title>
    <meta name="description" content="A privacy-first social network. Before the feeds. Before the ads. Before your attention was the product." />
    <meta name="keywords" content="social network, privacy first, the people book, chronological feed, social media" />
    
    <!-- Open Graph (Facebook/LinkedIn) -->
    <meta property="og:title" content="The People Book" />
    <meta property="og:description" content="A privacy-first social network without ads or tracking." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The People Book" />
    <meta name="twitter:description" content="A privacy-first social network. No ads. No tracking." />
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
